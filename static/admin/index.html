<!DOCTYPE html>
<html>

<head>
    <title>StackEdit Blog Writer</title>
</head>

<body>
    <h1>Write Your Blog</h1>
    <button id="openStackEdit">Open Editor</button>

    <!-- Load StackEdit.js from the correct CDN -->
    <script src="https://cdn.jsdelivr.net/npm/stackedit-js@1.0.6/docs/lib/stackedit.min.js"></script>

    <script>
        // Ensure the script is loaded before using it
        window.addEventListener('DOMContentLoaded', () => {
            const stackedit = new Stackedit();

            document.getElementById('openStackEdit').addEventListener('click', () => {
                stackedit.openFile({
                    name: 'New Blog',
                    content: {
                        text: '# My New Blog\n\nWrite here...',
                    },
                });

                stackedit.on('fileChange', (file) => {
                    const content = file.content.text;
                    console.log("Blog content:", content);
                    // You can now send this to your backend or show a save button
                });
            });
        });
    </script>
</body>

</html>
