<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Editor | Uncle Kathaa</title>
  <script src="https://benweet.github.io/stackedit.js"></script>
</head>
<body>
  <h1>Markdown Editor</h1>
  <button id="start-editor">Open Editor</button>

  <script>
    const stackedit = new Stackedit();

    document.getElementById('start-editor').addEventListener('click', () => {
      stackedit.openFile({
        name: 'New post',
        content: {
          text: '# Start typing your story here\n\n- Point 1\n- Point 2'
        }
      });

      stackedit.on('fileChange', (file) => {
        console.log('Updated markdown:', file.content.text);
        // You can now POST this markdown content somewhere (e.g., via API)
      });
    });
  </script>
</body>
</html>
